<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Релиз — команды</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.35rem; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.35rem; font-weight: 500; }
    textarea { width: 100%; min-height: 100px; padding: 0.6rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    button { margin-top: 0.75rem; padding: 0.6rem 1.2rem; font-size: 1rem; background: #0d6efd; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #0b5ed7; }
    .result { margin-top: 1.5rem; padding: 1rem; background: #f5f5f5; border-radius: 6px; white-space: pre-wrap; word-break: break-word; }
    .result:empty { display: none; }
    .hint { margin-top: 0.5rem; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <h1>Релиз — команды</h1>
  <form method="post" action="/">
    <label for="text">Команда</label>
    <textarea id="text" name="text" placeholder="Например: привяжи задачи HM-REL-05-03-2026 в HRPRELEASE-123456" required>{{ text }}</textarea>
    <p class="hint">Примеры: «привяжи задачи FIXVERSION в HRPRELEASE-123», «двигай HRPRELEASE-123 дальше», «запусти полный цикл релиза для HRPRELEASE-123»</p>
    <button type="submit">Выполнить</button>
  </form>
  {% if result %}
  <div class="result">{{ result }}</div>
  {% endif %}
</body>
</html>
